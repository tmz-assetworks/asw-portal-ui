<!-- backdrop -->
<div class="support-backdrop" (click)="onBackdropClick($event)" aria-hidden="true">
  <!-- popup container -->
  <div class="support-popup" role="dialog" aria-modal="true" aria-labelledby="support-title">
    <div class="popup-header">
      <h3 id="support-title" class="popup-title">Get Support</h3>
      <button type="button" class="close-btn" aria-label="Close support dialog" (click)="close.emit()">
        <!-- small accessible X -->
        <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6 6 L18 18 M6 18 L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <p class="popup-subtext">
      Use the contact information below to get in touch with the support team.
    </p>

    <div class="popup-body">
      <div class="info-row">
        <div class="icon" aria-hidden="true">
          <!-- envelope svg -->
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M3 7.5 L12 13 L21 7.5 V18.5 H3z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </div>
        <div class="info-text">
          <div class="label">Email</div>
          <a class="value" href="mailto:EVsupport@assetworks.com">EVsupport@assetworks.com</a>
        </div>
      </div>

      <div class="info-row">
        <div class="icon" aria-hidden="true">
          <!-- phone svg -->
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M6.6 10.8a13.3 13.3 0 0 0 6.6 6.6l1.8-1.8a1.2 1.2 0 0 1 1.2-.3 11 11 0 0 0 3.4.5 1 1 0 0 1 1 1V21a1 1 0 0 1-1 1A17 17 0 0 1 3 5a1 1 0 0 1 1-1h2.3a1 1 0 0 1 1 1 11 11 0 0 0 .5 3.4c.1.4 0 .9-.3 1.2z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        </div>
        <div class="info-text">
          <div class="label">Phone</div>
          <div class="value">8am–5pm EST, on-call for emergencies<br><strong>1-800-900-8152</strong></div>
        </div>
      </div>
    </div>
  </div>
</div>
