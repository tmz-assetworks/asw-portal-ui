<!-- backdrop -->
<button
  class="support-backdrop"
  type="button"
  aria-label="Close support dialog"
  (click)="onBackdropClick($event)">

  <!-- popup container -->
  <dialog
    class="support-popup"
    aria-labelledby="support-title"
    open>

    <div class="popup-header">
      <h3 id="support-title" class="popup-title">Get Support</h3>

      <button
        type="button"
        class="close-btn"
        aria-label="Close support dialog"
        (click)="closeModal.emit()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          aria-hidden="true"
          focusable="false">
          <path
            d="M6 6 L18 18 M6 18 L18 6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <p class="popup-subtext">
      Use the contact information below to get in touch with the support team.
    </p>

    <div class="popup-body">
      <div class="info-row">
        <div class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" focusable="false">
            
            <!-- Envelope box -->
            <rect
              x="3"
              y="6"
              width="18"
              height="12"
              rx="2"
              ry="2"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5" />
          
            <!-- Flap (top line fix) -->
            <path
              d="M3 6 L12 13 L21 6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round" />
              
          </svg>
        </div>
        <div class="info-text">
          <div class="label">Email</div>
          <a class="value" href="mailto:EVsupport@assetworks.com">
            EVsupport@assetworks.com
          </a>
        </div>
      </div>

      <div class="info-row">
        <div class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" focusable="false">
            <path
              d="M6.6 10.8a13.3 13.3 0 0 0 6.6 6.6l1.8-1.8
                 a1.2 1.2 0 0 1 1.2-.3
                 11 11 0 0 0 3.4.5
                 1 1 0 0 1 1 1V21
                 a1 1 0 0 1-1 1
                 A17 17 0 0 1 3 5
                 a1 1 0 0 1 1-1h2.3
                 a1 1 0 0 1 1 1
                 11 11 0 0 0 .5 3.4
                 c.1.4 0 .9-.3 1.2z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <div class="info-text">
          <div class="label">Phone</div>
          <div class="value">
            8am–5pm EST, on-call for emergencies<br />
            <strong>1-800-900-8152</strong>
          </div>
        </div>
      </div>

    </div>
  </dialog>
</button>
