<div class="session-expired-container">

  <div class="icon">⚠</div>

  <h2 class="title">Session Expired</h2>

  <p class="message">
    You have been logged out due to inactivity.
    Please log in again to continue.
  </p>

  <div class="actions">
    <button class="logoutOk" mat-raised-button color="primary" (click)="close()">
      OK
    </button>
  </div>

</div>
