<button class="close" mat-button [mat-dialog-close]="true">X</button>

<div class="cust-list-flex1 layout alert-main">
  <h3 class="cust-list-subtitle layout">Description of Charger Status</h3>

  <div>
    <div class="layout mat-data">
      <table
        mat-table
        [dataSource]="dataSource"
        matSorts
        class="mat-elevation-z8"
      >
        <ng-container matColumnDef="status">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            class="fontsize14"
          >
            CHARGER STATUS
          </th>
          <td mat-cell *matCellDef="let element; let i = index">
            {{ element.status }}
          </td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            class="fontsize14"
          >
            DESCRIPTION
          </th>
          <td mat-cell *matCellDef="let element; let i = index">
            {{ element.description }}
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
    <!-- <mat-paginator
        #paginator
        (page)="pageChange($event)"
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
      ></mat-paginator> -->
  </div>
</div>
