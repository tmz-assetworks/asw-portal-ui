<div
  [ngStyle]="{ 'z-index': '6' }"
  [ngClass]="
    messages
      ? 'nav-transition nav-block2-collapse layout'
      : 'nav-transition  nav-block2 layout'
  "
  id="leftBar"
>
  <div
    [ngClass]="
      messages
        ? 'nav-transition nav-block2-collapse layout'
        : 'nav-transition  nav-block19 layout'
    "
    id="leftBar"
  >
    <div class="nav-block3 layout">
      <div class="nav-block3-item">
        <div class="nav-box layout" (click)="home()">
          <ng-container *ngIf="!messages">
            <img src="../../../../assets/nav-logo.svg" alt="" />
          </ng-container>
          <ng-container *ngIf="messages">
            <img
              src="../../../../assets/logo-collapse.svg"
              style="width: 30px;"
              alt=""
            />
          </ng-container>
        </div>
      </div>
    </div>
    <ng-container *ngFor="let item of menuItems; let i = index">
      <div>
        <!-- Common structure for both regular and subMenu items -->
        <div
          (click)="item.subMenu ? toggleSubMenu(i) : null"
          (keydown.enter)="item.subMenu ? toggleSubMenu(i) : null"
          class="menu-item"
        >
          <a
            *ngIf="!item.subMenu"
            [routerLink]="item.routerLink"
            [ngClass]="messages ? 'navbtn-block4 layout-colapse' : 'navbtn-block4 layout'"
          >
            <div
              class="navbtn-block5 layout pointer"
              routerLinkActive="link-active"
              id="menulink"
            >
              <div class="navbtn-block5-item">
                <div class="navbtn-box1 layout">
                  <img [src]="item.icon" alt="" />
                </div>
              </div>
              <div class="navbtn-block5-spacer"></div>
              <div
                [ngClass]="
                  messages ? 'navbtn-block5-item1-colapse' : 'navbtn-block5-item1'
                "
              >
                <div
                  [ngClass]="
                    messages
                      ? 'navbtn-text-body-collapse'
                      : 'navbtn-text-body layout'
                  "
                >
                  {{ item.text }}
                </div>
              </div>
            </div>
          </a>
    
          <div
            *ngIf="item.subMenu"
            [ngClass]="messages ? 'navbtn-block4 layout-colapse' : 'navbtn-block4 layout'"
          >
            <div
              class="navbtn-block5 layout pointer"
              routerLinkActive="link-active"
              id="submenulink"
            >
              <div class="navbtn-block5-item">
                <div class="navbtn-box1 layout">
                  <img [src]="item.icon" alt="" />
                </div>
              </div>
              <div class="navbtn-block5-spacer"></div>
              <div
                [ngClass]="
                  messages ? 'navbtn-block5-item1-colapse' : 'navbtn-block5-item1'
                "
              >
                <div
                  [ngClass]="
                    messages
                      ? 'navbtn-text-body-collapse'
                      : 'navbtn-text-body layout'
                  "
                >
                  {{ item.text }}
                  <span class="arrow-icon">{{ item.isOpen ? '↑' : '↓' }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
    
        <!-- Submenu section -->
        <div *ngIf="item.isOpen" class="submenu" id="submenu">
          <ng-container *ngFor="let subItem of item.subMenu">
            <a [routerLink]="subItem.routerLink" class="submenu-item">
              <div class="submenu-icon">
                <img [src]="subItem.icon" alt="" />
              </div>
              <div class="submenu-text">{{ subItem.text }}</div>
            </a>
          </ng-container>
        </div>
      </div>
    </ng-container>
    
    
    
    
  </div>
</div>
