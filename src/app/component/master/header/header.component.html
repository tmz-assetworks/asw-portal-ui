<!-- loader start -->
<div class="loader" *ngIf="showLoader">
  <div>
    <img
      src="../../../assets/images/myloader.gif"
      class="margin"
      width="18%"
      height="22%"
    />
  </div>
</div>
<!-- loader end -->
<div class="header-block7 layout">
  <div [ngClass]="isAdmin ? 'headerAdmin':'header-block8 layout'">
    <div class="header-section1">
      <div class="header-block8-item">
        <div class="header-block9 layout">
          <div class="header-block9-item">
            <img
              id="900923"
              [src]="isAdmin ? '../../../../assets/Toggle-btnForAdmin.svg' : '../../../../assets/Toggle-btn.svg'"
              class="header-box2 layout"
              (click)="toggleNav()"
            />
          </div>
          <div class="header-block9-spacer"></div>
          <div class="header-block9-item1">
            <div class="header-box3 layout"></div>
          </div>
          <div class="header-block9-spacer"></div>
          <div class="header-block9-item2"></div>
        </div>
      </div>
    </div>
    <div class="header-section2">
      
        <!-- ⭐ Support Button Wrapper -->
         <div class="support-wrapper">
           <button 
             class="support-pill-btn" 
             (click)="openSupport()" 
             aria-haspopup="dialog" 
             [attr.aria-expanded]="showSupport">

             <span class="label">Support</span>

             <span class="info-icon" aria-hidden="true">
               <svg width="14" height="14" viewBox="0 0 24 24">
                 <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                 <line x1="12" y1="11" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                 <circle cx="12" cy="8" r="1" fill="currentColor"/>
               </svg>
             </span>

           </button>
            <!-- 🛒 SHOP BUTTON -->
           <button 
             class="support-pill-btn shop-btn"
             (click)="openShop()">

             <span class="label">Shop</span>

             <span class="info-icon" aria-hidden="true">
               <!-- Shopping Cart Icon -->
               <svg width="14" height="14" viewBox="0 0 24 24">
                 <path
                   d="M6 6h15l-1.5 9h-11z"
                   fill="none"
                   stroke="currentColor"
                   stroke-width="1.8"
                   stroke-linejoin="round"/>
                 <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
                 <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
                 <path d="M6 6l-2-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
               </svg>
             </span>

           </button>
         </div>
         <!-- END Support Wrapper -->



      <div *ngIf="role == 'Operator'" class="txt_menu" [routerLink]="['alerts']" [queryParams]="{type: 'notification'}">
        <img src="../../../../assets/images/bell.png" />
        <div class="count_circle" matTooltip="{{ countByUserId }}">
          <p>{{ countByUserId }}</p>
        </div>
      </div>
      <p class="profile_txt">Hi! {{ username }}</p>

      <div class="header-block8-spacer"></div>
      <div class="header-block8-item2">
        <div class="header-box5 layout">
          <button
            mat-icon-button
            [matMenuTriggerFor]="menu"
            aria-label="Example icon-button with a menu">
            <img
              class="profile-image"
              src="{{
                profileImg ? profileImg : '../../../assets/default_image.png'
              }}"
              alt=""
            />
            <!-- <mat-icon>more_vert</mat-icon> -->
          </button>
          <mat-menu #menu="matMenu">
            <button
              mat-menu-item
              class="cursorPointer"
              [routerLink]="['user-profile']">
              <mat-icon>settings</mat-icon>
              <span>Profile Settings</span>
            </button>
             <!-- Apply checks to show only for admin -->
            @if(role == 'Admin') {
              <button
                mat-menu-item
                class="cursorPointer"
                [routerLink]="['profile']">
                <mat-icon>domain</mat-icon>
                <span>Organization Profile</span>
              </button>
            }
            <button mat-menu-item class="cursorPointer" (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        </div>
      </div>
    </div>
  </div>
</div>
<app-support-modal *ngIf="showSupport" (closeModal)="closeSupport()"></app-support-modal>
