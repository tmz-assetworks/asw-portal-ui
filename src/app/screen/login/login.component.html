<!-- loader -->
<div class="loader" *ngIf="showLoader">
  <div>
    <img src="../../../assets/images/myloader.gif" alt="" class="margin" width="18%" height="22%" />
  </div>
</div>

<div class="login login-block layout">
  <div class="login-block1 layout">
    <div class="login-block1-item bg_img_left">
      <div class="login-box layout"></div>
    </div>
    <div class="login-block1-item1">
      <div class="login-block2 layout">
        <div class="login-block2-spacer"></div>

        <div class="login-block2-item">
          <form [formGroup]="myLoginForm" (keyup.enter)="login()">
            <div class="login-block3 layout">
              <div class="login-block12 layout">
                <img src="../../../assets/images/logo_asset.svg" alt="" />
              </div>
              <div class="login-block4 layout">
                <h1 class="login-hero-title layout">Login</h1>
              </div>
              <div class="login-box1 layout" style="padding-bottom: 20px;"></div>
              <div class="login-block5 layout">
                <!-- Email field with floating label -->
               <mat-form-field appearance="outline" class="custom-mat-field email-field">
  <mat-label>Email</mat-label>
  <input 
    matInput 
    type="email" 
    formControlName="email" 
    placeholder="email@example.com"
    class="login-medium-title"
  />
  <mat-icon class="btn-cursor" matSuffix fontSet="material-icons-outlined">email</mat-icon>
  <mat-error *ngIf="myLoginForm?.get('email')?.invalid && myLoginForm?.get('email')?.touched">
    Please enter a valid email
  </mat-error>
</mat-form-field>

<!-- Password Field -->
<mat-form-field appearance="outline" class="custom-mat-field password-field">
  <mat-label>Password</mat-label>
  <input 
    matInput 
    [type]="passwordField ? 'password' : 'text'" 
    formControlName="password" 
    placeholder="Password"
    class="login-medium-title"
  />
  <button 
    mat-icon-button 
    matSuffix 
    (click)="showPassword()" 
    [attr.aria-label]="'Hide password'" 
    [attr.aria-pressed]="passwordField"
  >
    <mat-icon class="btn-cursor" fontSet="material-icons-outlined">
      {{passwordField ? 'visibility_off' : 'visibility'}}
    </mat-icon>
  </button>
  <mat-error *ngIf="myLoginForm?.get('password')?.invalid && myLoginForm?.get('password')?.touched">
    Password is required
  </mat-error>
</mat-form-field>
              </div>
              <div class="login-block8 layout">
                <div class="login-block9 layout">
                  <div class="login-block9-spacer"></div>
                  <div class="login-block9-item">
                    <label class="remember">
                      Remember me
                      <input type="checkbox" formControlName="rememeberMe" (change)="rememberMe($event)" />
                      <span class="remember_checkmark"></span>
                    </label>
                  </div>
                </div>

                <a href="#" class="link_txt" routerLink="/forgotPassword">
                  Forgot Password?
                </a>
              </div>
              <button type="submit" class="login-block10 layout mat-elevation-z4">
                <div>
                  <h2 class="login-medium-title3 layout" (click)="login()">
                    Login
                  </h2>
                </div>
              </button>
              <div class="login-block3-spacer1"></div>
            </div>
          </form>
        </div>
        <div class="login-block2-spacer"></div>
      </div>
    </div>
  </div>
</div>
