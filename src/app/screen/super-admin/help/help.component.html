<div class="location location-block layout">
  <div class="location-block1 layout">
    <div class="location-flex layout">
      <h3 class="location-subtitle-box layout">
        <pre class="location-subtitle">HELP</pre>
      </h3>

      <div class="location-block23 layout">
        <div class="location-block23-item">
          <!-- start here  -->

          <div class="location-block15 layout">
            <mat-accordion>
              <mat-expansion-panel
                (opened)="panelOpenState = true"
                (closed)="panelOpenState = false"
                hideToggle="true"
              >
                <mat-expansion-panel-header style="height: 50px">
                  <mat-panel-title> HOW TO ADD CUSTOMER </mat-panel-title>

                  <mat-icon *ngIf="!panelOpenState">add</mat-icon>
                  <mat-icon *ngIf="panelOpenState">remove</mat-icon>
                  <!-- <mat-panel-description>
                    
                    This is a summary of the content
                  </mat-panel-description> -->
                </mat-expansion-panel-header>
                <div class="location-flex14 layout">
                  <div class="location-block16 layout">
                    <div class="fill-block4 layout">
                      <div class="fill-block5 layout">
                        <div class="fill-block5-item">
                          <div class="fill-group layout">
                            <div class="fill-block6 layout">
                              <div class="fill-text-body1 layout">
                                <h1 class="step">STEP 1</h1>
                                <p class="help_subtilte">
                                  Click on customer setup
                                </p>
                              </div>
                              <h5 class="fill-highlights layout"></h5>
                            </div>

                            <img
                              src="../../../../assets/help/SuperAdmin/Customer-list.svg"
                              alt=""
                            />
                          </div>
                        </div>
                        <div class="fill-block5-spacer"></div>
                        <div class="fill-block5-item">
                          <div class="fill-group layout">
                            <div class="fill-block5 layout step-style">
                              <div class="fill-block5-item">
                                <div class="fill-group layout">
                                  <div class="fill-block6 layout">
                                    <div class="fill-text-body1 layout">
                                      <h1 class="step">STEP 2</h1>
                                      <p class="help_subtilte">
                                        Click on add customer
                                      </p>
                                    </div>
                                    <h5 class="fill-highlights layout"></h5>
                                  </div>

                                  <img
                                    src="../../../../assets/help/SuperAdmin/add-customer-form.svg"
                                    alt=""
                                  />
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item">
                            <div class="fill-group layout">
                              <div class="fill-block5-item">
                                <div class="fill-group layout mg-20">
                                  <div class="fill-block6 layout">
                                    <div class="fill-text-body1 layout">
                                      <h1 class="step">STEP 3</h1>
                                      <p class="help_subtilte">Click on save</p>
                                    </div>
                                    <h5 class="fill-highlights layout"></h5>
                                  </div>

                                  <img
                                    src="../../../../assets/help/SuperAdmin/add-customer.svg"
                                    alt=""
                                  />
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>
                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>

                          <div class="fill-block5-spacer"></div>
                          <div class="fill-block5-item"></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="location-block3-spacer"></div>
                  <div class="location-block3-item1"></div>
                </div>
              </mat-expansion-panel>
            </mat-accordion>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
