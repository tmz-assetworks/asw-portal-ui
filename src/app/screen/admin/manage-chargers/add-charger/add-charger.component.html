<div class="barbar-block10 layout">
    <div class="barbar-flex layout">
      <div class="barbar-block11 layout">
        <h3 class="barbar-subtitle layout">Add Chargers </h3>
      </div>

        <div></div>

                <h5 class="barbar-highlights layout">Asset ID</h5>

                    formControlName="username"
                    type="text"
                    class="barbar-input-text"
                  />
                </div>
              </div>
            </div>

                    <mat-select>
