  <div class="cust-list-flex3 layout">
    <div class="cust-list-flex3-item">
      <div class="cust-list-group layout">
        <div class="cust-list-block19 layout">
          <div class="cust-list-box9 layout">
            <img
              src="assets/images/serach.png"
              alt=""
              class="cust-list-icon layout"
            />
          </div>

          <div class="cust-list-block20 layout">
            <input
              class="cust-list-text-body21 layout"
              (keyup)="applyFilter($event)"
              placeholder="Search Assets"
              #input
            />
          </div>
        </div> 
      </div>
    </div>
    <div class="cust-list-flex3-spacer"></div>
    <div class="cust-list-flex3-item1">
      <div class="cust-list-block23 layout">
        <div class="cust-list-block23-item">
          <div class="cust-list-box10 layout">
            <img
              src="../../../../assets/superadmin-icons/add-icon.png"
              alt=""
              srcset=""
            />
          </div>
        </div>
        <div class="cust-list-block23-spacer"></div>
        <div class="cust-list-text-body4 layout"  [routerLink]="['add-chargers']">
          ADD CHARGERS
        </div>
      </div>
    </div>
  </div>
  <div class="layout mat-data">
      <table mat-table [dataSource]="dataSource"  class="mat-elevation-z8">
          <ng-container matColumnDef="VIN">
            <th mat-header-cell *matHeaderCellDef>ASSETS CATEGORY</th>
            <td mat-cell *matCellDef="let element">
              {{ element.VIN }}
            </td>
          </ng-container>

          <!-- Name Column -->
          <ng-container matColumnDef="ModelYear">
            <th mat-header-cell *matHeaderCellDef>ASSETS ID</th>
            <td mat-cell *matCellDef="let element">
              {{ element.ModelYear }}
            </td>
          </ng-container>

          <!-- Weight Column -->
          <ng-container matColumnDef="Name">
            <th mat-header-cell *matHeaderCellDef>
              MAKE
            </th>
            <td mat-cell *matCellDef="let element">
              {{ element.Name }}
            </td>
          </ng-container>

          <!-- Symbol Column -->
          <ng-container matColumnDef="Modal">
            <th mat-header-cell *matHeaderCellDef>MODEL</th>
            <td mat-cell *matCellDef="let element">
              {{ element.Modal }}
            </td>
          </ng-container>
          <ng-container matColumnDef="Status">
            <th mat-header-cell *matHeaderCellDef>STATUS</th>
            <td mat-cell *matCellDef="let element">
              {{ element.Status }}
            </td>
          </ng-container>

          <!-- Symbol Column -->
          <ng-container matColumnDef="Action">
            <th mat-header-cell *matHeaderCellDef>ACTION</th>
            <td
              mat-cell
              *matCellDef="let element"
              
              style="cursor: pointer;"
            >
              <img src="../../../../assets/icons/view-icon.png" [routerLink]="['add-chargers']" />&nbsp;
              <img src="../../../../assets/icons/Edit.png" [routerLink]="['add-chargers']" />
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
          ></tr>
        </table>

  </div>
  <mat-paginator
  [length]="100"
  [pageSizeOptions]="[10, 20, 100]"
></mat-paginator>
</div>
