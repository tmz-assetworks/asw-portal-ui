<div class="header header-block layout reports-main">
  <div class="header-block1 layout">
    <div class="header-flex layout">
      <div class="dashboard-block14 layout">

        <!-- Duration toggle -->
        <div class="dashboard-block32 layout">
          <div class="dashboard-block33 layout">
            <mat-button-toggle-group [formControl]="filterToggle">
              <mat-button-toggle value="Last24Hours" (click)="  ('Last24Hours')">Last 24 Hours</mat-button-toggle>
              <mat-button-toggle value="Last7Days">One Week</mat-button-toggle>
              <mat-button-toggle value="Last30Days">Current Month</mat-button-toggle>
              <mat-button-toggle value="Last90Days">Last 3 Months</mat-button-toggle>
            </mat-button-toggle-group>
          </div>
        </div>

        <!-- First row of charts -->
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-bar-chart
              [reportInvalidSessionData]="reportInvalidSessionData"
              [chartType]="'reportInvalidSession'"
              [chartTitle]="'Invalid Sessions'"
              (barDetailPage)="openDetailPage(2, 'Invalid Sessions', '', selectedDuration)">
            </app-bar-chart>
          </div>

          <div class="dashboard-block42-spacer"></div>

          <div class="dashboard-block42-item">
            <app-bar-chart
              [reportInvalidBootNotificationData]="reportInvalidBootNotification"
              [chartType]="'reportInvalidBootNotification'"
              [chartTitle]="'Invalid Boot Notifications'"
              (barDetailPage)="openDetailPage(2, 'Invalid Boot Notifications', '', selectedDuration)">
            </app-bar-chart>
          </div>
        </div>

        <!-- Second row of charts -->
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-bar-chart
              [reportLast24HourAlertsData]="report24AlertChartData"
              [chartType]="'reportLast24HourAlerts'"
              [chartTitle]="'Last 24-Hour Alerts'"
              (barDetailPage)="openDetailPage(2, 'Last 24-Hour Alerts', '', selectedDuration)">
            </app-bar-chart>
          </div>

          <div class="dashboard-block42-spacer"></div>
          <div class="dashboard-block42-item"></div>
        </div>

      </div>
    </div>
  </div>
</div>
