<div class="header header-block layout report-main">
  <div class="header-block1 layout">
    <div class="header-flex layout">
      <div class="dashboard-block14 layout">
        <div class="dashboard-block15 layout"></div>
        <div class="dashboard-block32 layout">
        </div>
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            @if (reportTransactionMonthlyData !== '') {
            <app-line-chart
              [reportTransactionMonthlyData]="reportTransactionMonthlyData"
              [chartType]="'reportTransactionMonthly'"
              (lineDetailPage)="
                openReportDetailPage(4, 'Cost by Month', 'REPORTS', 1)
              "
            ></app-line-chart>
            }
          </div>
          <div class="dashboard-block42-spacer"></div>
          <div class="dashboard-block42-item">
            @if (reportTransactionYearlyData !== '') {
            <app-bar-chart
              [reportTransactionYearlyData]="reportTransactionYearlyData"
              [reportTransactionYearlyData]="reportTransactionYearlyData"
              [chartType]="'reportTransactionYearly'"
              (barDetailPage)="
                openReportDetailPage(5, 'Cost by Year', 'REPORTS', 1)
              "
            ></app-bar-chart>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
