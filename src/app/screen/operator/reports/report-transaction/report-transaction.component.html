<div class="header header-block layout report-main">
  <div class="header-block1 layout">
    <div class="header-flex layout">
      <h1 class="header-subtitle-box layout">Reports</h1>

      <div class="dashboard-block12 layout"></div>
      <div class="location-block2 layout">
        <div class="location-block2-item">
          <div class="location-block4 layout">
            <div class="location-block4-item">
              <div class="location-block6 layout">
                <a [routerLink]="['../report-transaction']">
                   <div class="location-text-body layout">CHARGING COSTS</div>
                </a>
              </div>
            </div>
            <div class="location-block4-item">
              <div class="location-block5 layout">
                <a [routerLink]="['../report-session']">
                   <div class="location-text-body layout">CHARGER USAGE</div>
                </a>
              </div>
            </div>
          </div>
        </div>
        <div class="location-block2-spacer"></div>
        <div class="location-block2-item1">
          <div
            class="location-block3 layout"
            style="
              display: flex;
              flex-direction: column;
              background-color: #ebebeb;
              border-left: 1px solid white;
            "
          >
            <div class="location-box3 layout">
              <img
                src="../../../../assets/charger-session.svg"
                alt=""
                srcset=""
              />
            </div>
          </div>
        </div>
      </div>
      <div class="dashboard-block14 layout">
        <div class="dashboard-block15 layout"></div>
        <div class="dashboard-block32 layout">
        </div>
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            @if (reportTransactionMonthlyData !== '') {
            <app-line-chart
              [reportTransactionMonthlyData]="reportTransactionMonthlyData"
              [chartType]="'reportTransactionMonthly'"
              (lineDetailPage)="
                openReportDetailPage(4, 'Cost by Month', 'REPORTS', 1)
              "
            ></app-line-chart>
            }
          </div>
          <div class="dashboard-block42-spacer"></div>
          <div class="dashboard-block42-item">
            @if (reportTransactionYearlyData !== '') {
            <app-bar-chart
              [reportTransactionYearlyData]="reportTransactionYearlyData"
              [reportTransactionYearlyData]="reportTransactionYearlyData"
              [chartType]="'reportTransactionYearly'"
              (barDetailPage)="
                openReportDetailPage(5, 'Cost by Year', 'REPORTS', 1)
              "
            ></app-bar-chart>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
