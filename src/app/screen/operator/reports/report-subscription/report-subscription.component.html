        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-bar-chart
              *ngIf="reportSubscribeMonthlyData !== ''"
              [reportSubscribeMonthlyData]="reportSubscribeMonthlyData"
              [chartType]="'reportSubscribeMonthly'"
              [chartTitle]="'Monthly Subscription'"
              (barDetailPage)="
                openReportDetailPage(1, 'Monthly Subscription', 'REPORTS', '')
              "
            ></app-bar-chart>
