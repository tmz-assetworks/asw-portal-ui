<div class="header header-block layout">
  <div class="header-block1 layout">
    <div class="header-flex layout">
      <h3 class="header-subtitle-box layout">{{ chargerboxid }}</h3>

      <div class="dashboard-block12 layout"></div>

      <!-- <div class="dashboard-block13 layout">
        <div class="dashboard-block13-item"> -->
      <div class="location-block2 layout charger_main">
        <div class="location-block2-item">
          <div class="location-block4 layout">
            <div class="location-block4-item">
              <div class="location-block6 layout">
                <a [routerLink]="['../chargers-analytics']">
                  <div class="location-text-body layout">ANALYTICS</div>
                </a>
              </div>
            </div>
            <div class="location-block4-item">
              <div class="location-block5 layout">
                <a [routerLink]="['../chargers-info']">
                  <div class="location-text-body layout">
                    CHARGER INFORMATION
                  </div>
                </a>
              </div>
            </div>
            <div class="location-block4-item">
              <div class="location-block5 layout">
                <a [routerLink]="['../chargers-session']">
                  <div class="location-text-body layout">
                    CHARGE SESSIONS
                  </div>
                </a>
              </div>
            </div>
            <div class="location-block4-item">
              <div class="location-block5 layout">
                <a [routerLink]="['../chargers-diagnostic']">
                  <div class="location-text-body layout">DIAGNOSTIC</div>
                </a>
              </div>
            </div>
            <div class="location-block4-item">
              <div class="location-block5 layout">
                <a [routerLink]="['../chargers-event']">
                  <div class="location-text-body layout">EVENT LOGS</div>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="location-block2-spacer"></div>
        <div class="location-block2-item1">
          <div
            class="location-block3 layout"
            style="
              display: flex;
              flex-direction: column;
              background-color: #ebebeb;
              border-left: 1px solid white;
            "
          >
            <div class="location-box3 layout">
              <img
                src="../../../../../assets/charger-ana.svg"
                alt=""
                srcset=""
              />
            </div>
          </div>
        </div>
      </div>
      <div class="dashboard-block14 layout charger_content">
        <div class="dashboard-block15 layout"></div>
        <div class="dashboard-block32 layout">
          <div class="dashboard-block33 layout">
            <div class="dashboard-block33-item">
              <mat-button-toggle-group
                [formControl]="filterToggle"
                (change)="setTime($event)"
              >
                <div class="dashboard-block33-item1">
                  <div class="dashboard-block35 layout space-between">
                    <mat-button-toggle
                      value="1"
                      style="border: 1px solid #0062a6;"
                    >
                      Last 24 Hours
                    </mat-button-toggle>
                    <!-- <div class="dashboard-text-body2 layout">
                  Last 24 Hours
                </div> -->
                  </div>
                </div>
                <div class="dashboard-block33-item2">
                  <div class="dashboard-block36 layout space-between">
                    <mat-button-toggle value="7">
                      One Week
                    </mat-button-toggle>
                    <!-- <div class="dashboard-text-body3 layout">
                  One Week
                </div> -->
                  </div>
                </div>
                <div class="dashboard-block33-item3">
                  <div class="dashboard-block37 layout space-between">
                    <!-- <div class="dashboard-text-body3 layout1">
                  Current Month
                </div> -->
                    <mat-button-toggle value="30">
                      Current Month
                    </mat-button-toggle>
                  </div>
                </div>
                <div class="dashboard-block33-item4">
                  <div class="dashboard-block38 layout space-between">
                    <!-- <div class="dashboard-text-body3 layout2">
                  Last 3 Months
                </div> -->
                    <mat-button-toggle value="90">
                      Last 3 Months
                    </mat-button-toggle>
                  </div>
                </div>
              </mat-button-toggle-group>
            </div>
          </div>
        </div>
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-bar-chart
              *ngIf="chargersChartData !== ''"
              [chargersData]="chargersChartData"
              [chartType]="'bar'"
              [chartTitle]="'Chargers'"
              (barDetailPage)="
                openDetailPage(5, 'Chargers', 'ANALYTICS', selectedTime)
              "
            ></app-bar-chart>
            <!-- <app-graph-card></app-graph-card> -->
            <!-- <a [routerLink]="['../location-status']">Location status</a> -->
          </div>
          <div class="dashboard-block42-spacer"></div>
          <div class="dashboard-block42-item">
            <app-area-chart
              [chargingSessionData]="chargingSessionData"
              [chartType]="chargingSession"
              [chartTitle]="chargingSessionTitle"
              (areaDetailPage)="
                openDetailPage(2, 'Charging Session', 'ANALYTICS', selectedTime)
              "
            ></app-area-chart>
          </div>
        </div>
        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-line-chart
              *ngIf="energyAnalyticsUsedData !== ''"
              [energyUsedData]="energyAnalyticsUsedData"
              [chartType]="energyAnalyticsUsed"
              [chartTitle]="energyAnalyticsUsedTitle"
              (lineDetailPage)="
                openDetailPage(7, 'Energy Used', 'ANALYTICS', selectedTime)
              "
            ></app-line-chart>
          </div>
          <div class="dashboard-block42-spacer"></div>
          <div class="dashboard-block42-item">
            <app-stacked-area-chart
              *ngIf="locationAnalyticsMilesAddData !== ''"
              [locationAnalyticsMilesAddData]="locationAnalyticsMilesAddData"
              [chartType]="locationAnalyticsMilesAdd"
              [chartTitle]="locationAnalyticsMilesAddTitle"
              (stackedAreaDetailPage)="
                openDetailPage(8, 'Miles Added', 'ANALYTICS', selectedTime)
              "
            ></app-stacked-area-chart>
          </div>
        </div>
      </div>
    </div>

    <div class="dashboard-block13-spacer"></div>
  </div>
</div>
<!-- </div>
</div> -->
