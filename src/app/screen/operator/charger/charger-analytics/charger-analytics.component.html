<div class="header header-block layout">
  <div class="header-block1 layout">
    <div class="header-flex layout">
      <h1 class="header-subtitle-box layout">{{ chargerboxid }}</h1>

      <div class="dashboard-block12 layout"></div>

      <div class="location-block2 layout charger_main">
        <div class="location-block2-item">
          <div class="location-block4 layout">
            <ng-container *ngFor="let link of navigationLinks; trackBy: trackByPath">
              <div class="location-block4-item">
                <div class="location-block5 layout">
                  <a [routerLink]="[link.path]">
                    <div class="location-text-body layout">{{ link.label }}</div>
                  </a>
                </div>
              </div>
            </ng-container>
          </div>
        </div>

        <div class="location-block2-spacer"></div>

        <div class="location-block2-item1">
          <div class="location-block3 layout custom-block3">
            <div class="location-box3 layout">
              <img src="../../../../../assets/charger-ana.svg" alt="Charger Icon" />
            </div>
          </div>
        </div>
      </div>

      <div class="dashboard-block14 layout charger_content">
        <div class="dashboard-block15 layout"></div>

        <div class="dashboard-block32 layout">
          <div class="dashboard-block33 layout">
            <div class="dashboard-block33-item">
              <mat-button-toggle-group [formControl]="filterToggle" (change)="setTime($event)">
                <mat-button-toggle value="1" class="toggle-btn">Last 24 Hours</mat-button-toggle>
                <mat-button-toggle value="7" class="toggle-btn">One Week</mat-button-toggle>
                <mat-button-toggle value="30" class="toggle-btn">Current Month</mat-button-toggle>
                <mat-button-toggle value="90" class="toggle-btn">Last 3 Months</mat-button-toggle>
              </mat-button-toggle-group>
            </div>
          </div>
        </div>

        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-bar-chart
              *ngIf="chargersChartData"
              [chargersData]="chargersChartData"
              chartType="bar"
              chartTitle="Chargers"
              (barDetailPage)="openDetailPage(5, 'Chargers', 'ANALYTICS', selectedTime)"
            ></app-bar-chart>
          </div>

          <div class="dashboard-block42-spacer"></div>

          <div class="dashboard-block42-item">
            <app-area-chart
              [chargingSessionData]="chargingSessionData"
              [chartType]="chargingSession"
              [chartTitle]="chargingSessionTitle"
              (areaDetailPage)="openDetailPage(2, 'Charging Session', 'ANALYTICS', selectedTime)"
            ></app-area-chart>
          </div>
        </div>

        <div class="dashboard-block42 layout">
          <div class="dashboard-block42-item">
            <app-line-chart
              *ngIf="energyAnalyticsUsedData"
              [energyUsedData]="energyAnalyticsUsedData"
              [chartType]="energyAnalyticsUsed"
              [chartTitle]="energyAnalyticsUsedTitle"
              (lineDetailPage)="openDetailPage(7, 'Energy Used', 'ANALYTICS', selectedTime)"
            ></app-line-chart>
          </div>

          <div class="dashboard-block42-spacer"></div>

          <div class="dashboard-block42-item">
            <app-stacked-area-chart
              *ngIf="locationAnalyticsMilesAddData"
              [locationAnalyticsMilesAddData]="locationAnalyticsMilesAddData"
              [chartType]="locationAnalyticsMilesAdd"
              [chartTitle]="locationAnalyticsMilesAddTitle"
              (stackedAreaDetailPage)="openDetailPage(8, 'Miles Added', 'ANALYTICS', selectedTime)"
            ></app-stacked-area-chart>
          </div>
        </div>
      </div>
    </div>

    <div class="dashboard-block13-spacer"></div>
  </div>
</div>
