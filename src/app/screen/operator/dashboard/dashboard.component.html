<div class="dashboard-block12 layout">
  <h1 class="dashboard-subtitle layout">Operations Dashboard</h1>
</div>
<div class="dashboard-block13 layout opt-dashboard">
  <div class="dashboard-block13-item">
    <div class="dashboard-block14 layout">
      <div class="dashboard-block15 layout">
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="locations"
            [data]="summaryStatus[0]"
            [url]="userRole + '/location'"
            [showStatusBars]="false"
            [compactMode]="true"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer"></div>
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="chargers"
            [data]="summaryStatus[1]"
            [url]="userRole + '/charger'"
            [showStatusBars]="false"
            [compactMode]="true"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer1"></div>
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="charging_session"
            [data]="summaryStatus[2]"
            [url]="userRole + '/reports/report-session'"
            [showStatusBars]="false"
            [compactMode]="true"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer"></div>
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="errors"
            [data]="summaryStatus[3]"
            [showStatusBars]="false"
            [compactMode]="true"
            [clickable]="false"
          ></app-widget>
        </div>
      </div>

      <div class="dashboard-block48 layout">
        <div class="dashboard-block48-item">
          <div class="dashboard-block49 layout">
            <div class="dashboard-flex layout">
              <div class="dashboard-flex-item">
                <div class="dashboard-group layout3">
                  <h4 style="width: max-content;" class="dashboard-map-title">
                    Charger Count and Status
                  </h4>
                </div>
              </div>
              <div class="dashboard-flex-spacer"></div>
              <div class="dashboard-flex-item1">
                <div class="dashboard-box11 layout1">
                  <img
                    class="info-icon"
                    (click)="showLegendsInfo()"
                    src="../../../../assets/information-outline.svg"
                    alt=""
                  />
                </div>
              </div>
            </div>
          </div>

          <div id="map" style="width: 100%; height: 50vh;"></div>
        </div>
      </div>
      <div class="dashboard-block32 layout">
        <div class="dashboard-block33 layout">
                <mat-form-field appearance="outline" class="custom-select-field">
                  <mat-label>Select Location</mat-label>
                  <mat-select
                    multiple
                    [formControl]="locationIds"
                    (onSelectionChange)="onSelectLocation($event)"
                  >
                    <mat-option
                      *ngFor="let item of locationList"
                      [value]="item.id"
                    >
                      {{ item.locationName }}
                    </mat-option>
                  </mat-select>
                </mat-form-field>
          <mat-button-toggle-group
            [formControl]="filterToggle"
            (change)="setTime($event)"
          >
            <div class="dashboard-block33-item1">
              <div class="dashboard-block35 layout space-between">
                <mat-button-toggle value="1" style="border: 1px solid #0062a6;">
                  Last 24 Hours
                </mat-button-toggle>
              </div>
            </div>
            <div class="dashboard-block33-item2">
              <div class="dashboard-block36 layout space-between">
                <mat-button-toggle value="7">One Week</mat-button-toggle>
              </div>
            </div>
            <div class="dashboard-block33-item3">
              <div class="dashboard-block37 layout space-between">
                <mat-button-toggle value="30">Current Month</mat-button-toggle>
              </div>
            </div>
            <div class="dashboard-block33-item4">
              <div class="dashboard-block38 layout space-between">
                <mat-button-toggle value="90">Last 3 Months</mat-button-toggle>
              </div>
            </div>
          </mat-button-toggle-group>
        </div>
      </div>

      <div class="dashboard-block42 layout">
        <div class="dashboard-block42-item">
          <!--graph starts-->
           <app-line-chart
              *ngIf="costData !== ''"
              [reportTransactionMonthlyData]="costData || []"
              [chartType]="'reportTransactionMonthly'"
              
               (lineDetailPage)="
                openReportDetailPage(4, 'Cost by Month', 'REPORTS', 1)"
            ></app-line-chart>
           <!-- chart ends-->
        </div>
        <div class="dashboard-block42-item">
          @if (chargingSessionData !== ''){
            <app-area-chart
            (areaDetailPage)="
              openDetailPage(
                2,
                'Charging Sessions',
                'DASHBOARD',
                selectedTime,
                selecteLocationIds
              )
            "
            [chargingSessionData]="chargingSessionData"
            [chartType]="'dashboardChargingSession'"
            [chartTitle]="'Charging Sessions'"
          ></app-area-chart>
          }
         
        </div>
      </div>
      <div class="dashboard-block42 layout">
        <div class="dashboard-block42-item">
          <app-line-chart
            *ngIf="energyUsedData !== ''"
            [energyUsedData]="energyUsedData"
            [chartType]="'dashboardEnergyUsed'"
            [chartTitle]="'Energy Use Over Time'"
            (lineDetailPage)="
              openDetailPage(
                3,
                'Energy Use Over Time',
                'DASHBOARD',
                selectedTime,
                selecteLocationIds
              )
            "
          ></app-line-chart>
        </div>
        <div class="dashboard-block42-spacer"></div>
        <div class="dashboard-block42-item">
          <app-bar-chart
            *ngIf="locationPerformingData !== ''" 
            [chartType]="'dashboardlocationPerform'"
            [chartTitle]="'Charging by Location'"
            [toggle]="true"
            [locationPerformingData]="locationPerformingData"
            (toggleValueChanges)="changeToggleValue($event)"
          ></app-bar-chart>
        </div>
      </div>
    </div>
  </div>
  <div class="dashboard-block13-spacer"></div>
  <div class="dashboard-block13-item1">
    <app-dashboard-status-panel></app-dashboard-status-panel>
  </div>
</div>
