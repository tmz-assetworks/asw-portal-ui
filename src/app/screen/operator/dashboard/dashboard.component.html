<div class="dashboard-block12 layout">
  <h3 class="dashboard-subtitle layout">Operator Dashboard</h3>
</div>
<div class="dashboard-block13 layout opt-dashboard">
  <div class="dashboard-block13-item">
    <div class="dashboard-block14 layout">
      <div class="dashboard-block15 layout">
        <!-- <div *ngFor="let item of data; let i = index"> -->
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="locations"
            [data]="summaryStatus[0]"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer"></div>
        <!-- <div *ngif="i == 0" class="dashboard-block15-spacer"></div>
          <div *ngif="i == 1" class="dashboard-block15-spacer1"></div>
          <div *ngif="i == 2" class="dashboard-block15-spacer"></div> -->
        <!-- </div> -->
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="chargers"
            [data]="summaryStatus[1]"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer1"></div>
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="charging_session"
            [data]="summaryStatus[2]"
          ></app-widget>
        </div>
        <div class="dashboard-block15-spacer"></div>
        <div class="dashboard-block15-item">
          <app-widget
            [widgetIcon]="errors"
            [data]="summaryStatus[3]"
          ></app-widget>
        </div>
      </div>

      <div class="dashboard-block48 layout">
        <div class="dashboard-block48-item">
          <div class="dashboard-block49 layout">
            <div class="dashboard-flex layout">
              <div class="dashboard-flex-item">
                <div class="dashboard-group layout3">
                  <h4 style="width: max-content;">
                    Charger Count And Status
                  </h4>
                </div>
              </div>
              <div class="dashboard-flex-spacer"></div>
              <div class="dashboard-flex-item1">
                <div class="dashboard-box11 layout1"></div>
              </div>
            </div>
          </div>

          <div id="map" style="width: 100%; height: 50vh;"></div>
          <!-- <img src="../../../../assets/images/map.png" alt="" width="100%" /> -->
        </div>
      </div>
      <div class="dashboard-block32 layout">
        <div class="dashboard-block33 layout">
          <div class="dashboard-block33-item">
            <div class="dashboard-block34 layout">
              <!-- <div class="dashboard-text-body1 layout9">
              </div> -->

              <!-- <mat-form-field > -->
              <div class="dashboard-text-body1 layout9">
                <mat-form-field class="dashboard-text-body1 layout9">
                  <mat-label>Select Location</mat-label>
                  <mat-select
                    multiple
                    [formControl]="locationIds"
                    (onSelectionChange)="onSelectLocation($event)"
                  >
                    <mat-option
                      *ngFor="let item of locationList"
                      [value]="item.id"
                    >
                      {{ item.locationName }}
                    </mat-option>
                  </mat-select>
                </mat-form-field>

                <!-- <mat-label>Select Sites</mat-label>

                <mat-select
                  [(ngModel)]="type_list"
                  multiple
                  [formControl]="type_lists"
                >
                  <mat-option
                    *ngFor="let type of alteration_types"
                    [value]="type"
                  >
                    {{ type }}
                  </mat-option>
                </mat-select> -->
              </div>

              <!-- <select class="dashboard-text-body1 layout9">
                <option [ngValue]="null" selected>Select Sites</option>
                <option *ngFor="let type of alteration_types" [value]="type">
                  {{ type }}
                </option>
              </select> -->

              <!-- </mat-form-field> -->
            </div>
          </div>
          <mat-button-toggle-group
            [formControl]="filterToggle"
            (change)="setTime($event)"
          >
            <div class="dashboard-block33-item1">
              <div class="dashboard-block35 layout space-between">
                <!-- <div class="dashboard-text-body2 layout">
            Last 24 Hours
            </div> -->
                <mat-button-toggle value="1" style="border: 1px solid #0062a6;">
                  Last 24 Hours
                </mat-button-toggle>
              </div>
            </div>
            <div class="dashboard-block33-item2">
              <div class="dashboard-block36 layout space-between">
                <mat-button-toggle value="7">One Week</mat-button-toggle>
                <!-- <div class="dashboard-text-body3 layout">
              One Week
            </div> -->
              </div>
            </div>
            <div class="dashboard-block33-item3">
              <div class="dashboard-block37 layout space-between">
                <mat-button-toggle value="30">Current Month</mat-button-toggle>
                <!-- <div class="dashboard-text-body3 layout1">
            
              Current Month
            </div> -->
              </div>
            </div>
            <div class="dashboard-block33-item4">
              <div class="dashboard-block38 layout space-between">
                <mat-button-toggle value="90">Last 3 Months</mat-button-toggle>
                <!-- <div class="dashboard-text-body3 layout2">
              Last 3 Months
            </div> -->
              </div>
            </div>
          </mat-button-toggle-group>
        </div>
      </div>

      <div class="dashboard-block42 layout">
        <div class="dashboard-block42-item">
          <app-bar-chart
            *ngIf="chargersChartData !== ''"
            style="width: 100%; height: 100%;"
            [chartType]="bar"
            [chartTitle]="barTitle"
            [chargersData]="chargersChartData"
            (barDetailPage)="
              openDetailPage(1, 'Chargers', 'DASHBOARD', selectedTime)
            "
          ></app-bar-chart>
        </div>
        <!-- <div class="dashboard-block42-spacer"></div> -->
        <div class="dashboard-block42-item">
          <app-area-chart
            *ngIf="chargingSessionData !== ''"
            (areaDetailPage)="
              openDetailPage(2, 'Charging Session', 'DASHBOARD', selectedTime)
            "
            [chargingSessionData]="chargingSessionData"
            [chartType]="dashboardChargingSession"
            [chartTitle]="dashboardChargingSessionTitle"
          ></app-area-chart>
        </div>
      </div>
      <div class="dashboard-block42 layout">
        <div class="dashboard-block42-item">
          <app-line-chart
            *ngIf="energyUsedData !== ''"
            [energyUsedData]="energyUsedData"
            [chartType]="dashboardEnergyUsed"
            [chartTitle]="dashboardEnergyUsedTitle"
            (lineDetailPage)="
              openDetailPage(
                3,
                'Energy Demand Over Time',
                'DASHBOARD',
                selectedTime
              )
            "
          ></app-line-chart>
        </div>
        <div class="dashboard-block42-spacer"></div>
        <div class="dashboard-block42-item">
          <!-- <app-graph-card></app-graph-card>  
-->
          <app-bar-chart
            *ngIf="locationPerformingData !== ''"
            [chartType]="dashboardlocationPerform"
            [chartTitle]="locationPerormTitle"
            [toggle]="true"
            [locationPerformingData]="locationPerformingData"
            (toggleValueChanges)="changeToggleValue($event)"
          ></app-bar-chart>
        </div>
      </div>
    </div>
  </div>
  <div class="dashboard-block13-spacer"></div>
  <div class="dashboard-block13-item1">
    <app-dashboard-status-panel></app-dashboard-status-panel>
  </div>
</div>
