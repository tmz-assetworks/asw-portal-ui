<div class="location location-block layout">
  <div class="location-block1 layout">
    <div class="location-flex layout">
      <h3 class="location-subtitle-box layout">
        <pre class="location-subtitle">{{ locationName }} </pre>
      </h3>

      <div class="location-block23 layout">
        <div class="location-block23-item">
          <!-- <h3 class="dashboard-subtitle layout">Locations A</h3> -->
          <!--  <hr class="dashboard-line layout" /> -->
          <!-- </div> -->

          <div class="dashboard-block13 layout">
            <div class="dashboard-block13-item">
              <div class="location-block2 layout">
                <div class="location-block2-item">
                  <div class="location-block4 layout">
                    <div class="location-block4-item">
                      <div class="location-block5 layout">
                        <a [routerLink]="['../analytics']">
                          <div class="location-text-body layout">ANALYTICS</div>
                        </a>
                      </div>
                    </div>
                    <div class="location-block4-item">
                      <div class="location-block5 layout">
                        <a [routerLink]="['../location-info']">
                          <div class="location-text-body layout">
                            LOCATION INFORMATION
                          </div>
                        </a>
                      </div>
                    </div>
                    <div class="location-block4-item">
                      <div class="location-block5 layout">
                        <a [routerLink]="['../location-chargers']">
                          <div class="location-text-body layout">
                            LOCATION CHARGERS
                          </div>
                        </a>
                      </div>
                    </div>
                    <div class="location-block4-item">
                      <div class="location-block6 layout">
                        <a [routerLink]="['../events-log']">
                          <div class="location-text-body layout">
                            EVENT LOG
                          </div>
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="tabs-block2-spacer"></div>
                <div class="tabs-block2-item1">
                  <div class="tabs-block3 layout">
                    <img
                      class="tabs-box3 layout"
                      src="../../../../../assets/event-logs/event-log.png"
                      alt=""
                      srcset=""
                    />
                  </div>
                </div>
              </div>
              <div class="dashboard-block14 layout">
                <!-- <div class="dashboard-block42 layout"></div> -->

                <div class="dashboard-block39 layout">
                  <div class="dashboard-block48 layout">
                    <div class="dashboard-block48-item">
                      <div>
                        <div class="cust-list-flex3 layout">
                          <div class="cust-list-flex3-item">
                            <div class="cust-list-group layout">
                              <div class="cust-list-block19 layout">
                                <div class="cust-list-block20 layout">
                                  <!-- <mat-form-field class="barbar-box6 layout">
                                    <mat-label>All</mat-label>
                                    <mat-select>
                                      <mat-option class="form-dropdown">
                                        Reset
                                      </mat-option>
                                      <mat-option class="form-dropdown">
                                        Heartbeat
                                      </mat-option>
                                      <mat-option class="form-dropdown">
                                        Start Transaction
                                      </mat-option>
                                    </mat-select>
                                  </mat-form-field> -->

                                  <mat-form-field class="barbar-box6 layout">
                                    <select matNativeControl required>
                                      <option value="volvo">
                                        All
                                      </option>
                                      <option value="saab">Reset</option>
                                      <option value="mercedes">
                                        Heartbeat
                                      </option>
                                      <option value="audi">
                                        Start Transaction
                                      </option>
                                    </select>
                                  </mat-form-field>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="cust-list-flex3-spacer"></div>
                          <div class="cust-list-flex3-item1">
                            <div class="cust-list-block23 layout">
                              <div class="cust-list-block23-item">
                                <div class="cust-list-box10 layout">
                                  <img
                                    src="../../../../../assets/download-report.png"
                                    alt=""
                                    srcset=""
                                  />
                                </div>
                              </div>
                              <div class="cust-list-block23-spacer"></div>
                              &nbsp;&nbsp;
                              <div
                                class="cust-list-text-body4 layout"
                                [routerLink]="['createcustomer']"
                                routerLinkActive="router-link-active"
                              >
                                DOWNLOAD REPORTS
                              </div>
                            </div>
                          </div>
                        </div>

                        <div class="cust-list-group2 layout">
                          <table
                            mat-table
                            [dataSource]="dataSource"
                            multiTemplateDataRows
                            matSort
                            class="mat-elevation-z8"
                          >
                            <ng-container matColumnDef="Type">
                              <th
                                mat-header-cell
                                *matHeaderCellDef
                                mat-sort-header
                                class="fontsize14"
                              >
                                TYPE
                              </th>
                              <td
                                mat-cell
                                *matCellDef="let element; let i = index"
                                [ngClass]="{
                                  heartbeat: element.Type === 'Heartbeat',
                                  startTranstion:
                                    element.Type === 'Start Transaction',
                                  reset: element.Type === 'Reset'
                                }"
                              >
                                {{ element.Type }}
                              </td>
                            </ng-container>
                            <ng-container matColumnDef="DateTime">
                              <th
                                mat-header-cell
                                *matHeaderCellDef
                                mat-sort-header
                                class="fontsize14"
                              >
                                DATE/ TIME
                              </th>
                              <td
                                mat-cell
                                *matCellDef="let element; let i = index"
                              >
                                {{ element.DateTime }}
                              </td>
                            </ng-container>

                            <ng-container matColumnDef="SerialNumber">
                              <th
                                mat-header-cell
                                *matHeaderCellDef
                                mat-sort-header
                                class="fontsize14"
                              >
                                SERIAL NUMBER
                              </th>
                              <td
                                mat-cell
                                *matCellDef="let element; let i = index"
                              >
                                {{ element.SerialNumber }}
                              </td>
                            </ng-container>

                            <ng-container matColumnDef="action">
                              <th
                                mat-header-cell
                                *matHeaderCellDef
                                mat-sort-header
                                class="fontsize14"
                              >
                                ACTION
                              </th>
                              <td
                                mat-cell
                                *matCellDef="let element; let i = index"
                              >
                                <img
                                  style="cursor: pointer;"
                                  src="../../../../assets/icons/view-icon.png"
                                  (click)="
                                    expandedElement =
                                      expandedElement === element
                                        ? null
                                        : element
                                  "
                                />
                              </td>
                            </ng-container>
                            <ng-container matColumnDef="expandedDetail">
                              <td
                                style="background-color: #fff;"
                                mat-cell
                                *matCellDef="let element"
                                [attr.colspan]="displayedColumns.length"
                              >
                                <div
                                  class="example-element-detail"
                                  [@detailExpand]="
                                    element === expandedElement
                                      ? 'expanded'
                                      : 'collapsed'
                                  "
                                >
                                  <div class="example-element-description">
                                    <div class="">
                                      <div class="">
                                        <pre>
 {{ element.RequestPayload | json }}</pre
                                        >
                                      </div>
                                    </div>
                                    <hr />
                                    <div class="example-element-description">
                                      <pre>
 {{ element.ResponsePayload | json }}</pre
                                      >
                                    </div>
                                  </div>
                                </div>
                              </td>
                            </ng-container>

                            <tr
                              mat-header-row
                              *matHeaderRowDef="displayedColumns"
                            ></tr>
                            <tr
                              mat-row
                              *matRowDef="
                                let element;
                                columns: displayedColumns
                              "
                              class="example-element-row"
                              [class.example-expanded-row]="
                                expandedElement === element
                              "
                            ></tr>
                            <tr
                              mat-row
                              *matRowDef="let row; columns: ['expandedDetail']"
                              class="example-detail-row"
                            ></tr>
                          </table>
                          <mat-paginator
                            [length]="100"
                            [pageSizeOptions]="[10, 20, 100]"
                          ></mat-paginator>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="dashboard-block13-spacer"></div>
            <div class="dashboard-block13-item1">
              <app-location-status-panel></app-location-status-panel>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
