<div class="loader" *ngIf="showLoader">
  <div>
    <img
      src="../../../assets/images/myloader.gif"
      class="margin"
      width="18%"
      height="22%"
    />
  </div>
</div>

<ng-container *ngIf="commandType == 'changeAvailability'">
  <span class="option" (click)="closeDialog()">X</span>
  <div class="form-field modal-actions">
    <strong>Change Availability</strong>
    <br />
    <br />
    <span class="required">
      Select Type
      <span class="required-field">*</span>
    </span><br/>
    <select name="chargerType" #chargerType>
      <option value="">Type</option>
      <option value="Inoperative">Inoperative</option>
      <option value="Operative">Operative</option>
    </select>
    <br />
    <br />
    <span class="required">
      Select Connector ID
      <span class="required-field">*</span>
    </span><br/>
    <select name="connector_id" #connector_id>
      <option value="">Connector ID</option>

      <option *ngFor="let item of selectConnectorIds">
        {{ item }}
      </option>
    </select>
    <br />

    <button
      class="btnTypeCharger"
      type="button"
      (click)="changeAvailability(chargerType.value, connector_id.value)"
    >
      Submit
    </button>
  </div>
</ng-container>
<ng-container *ngIf="commandType == 'reset'">
  <span class="option" (click)="closeDialog()">X</span>
  <div class="form-field modal-actions">
    <strong>Reset Command</strong>
    <br />
    <br />
    <span class="required">
      Select Type
      <span class="required-field">*</span>
    </span>
    <br />
    <br />
    <select class="chargerType" name="chargerType" #chargerType>
      <option value="">Type</option>
      <option value="Hard">Hard</option>
      <option value="Soft">Soft</option>
    </select>
    <br />
    <button
      class="btnTypeCharger"
      type="button"
      (click)="reset(chargerType.value)"
    >
      Submit
    </button>
  </div>
</ng-container>
<ng-container *ngIf="commandType == 'start'">
  <span class="option" (click)="closeDialog()">X</span>
  <div class="form-field modal-actions">
    <strong>Remote Start Transaction</strong>
    <br />
    <br />
    <span class="required">
      Select Connector Id
    </span>
    <br />
    <select name="connector_id" #connector_id>
      <option value="">Connector ID</option>

      <option *ngFor="let item of selectConnectorIds">
        {{ item }}
      </option>
    </select>
    <br />
    <br />
    <br />
    <span class="required inpt-field">
      Enter RFID ID
      <span class="required-field">*</span>
    </span>
    <input placeholder="RFID" #inputTag class="connector_id rfid_i" />
    <br />

    <button
      class="btnTypeCharger"
      type="button"
      (click)="remoteStartTransaction(inputTag.value, connector_id.value)"
    >
      Submit
    </button>
  </div>
</ng-container>
<ng-container *ngIf="commandType == 'stop'">
  <span class="option" (click)="closeDialog()">X</span>
  <div class="form-field modal-actions">
    <strong>Remote Stop Transaction</strong>
  </div>
  <br />
  <!-- <br /> -->

  <span class="required input-field">
    Enter Transaction ID
    <span class="required-field" style="color: red;">*</span>
  </span>
  <input
    class="rfid_i"
    placeholder="Transaction ID"
    name="transactionId"
    #transactionId
  />
  <br />

  <button
    class="btnTypeCharger"
    type="button"
    (click)="remoteStopTransaction(transactionId.value)"
  >
    Submit
  </button>
</ng-container>
