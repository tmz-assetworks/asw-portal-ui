#
# Pipeline that will build the ui project and publish the artifacts so 
# can be picked up by a release.
#
# Builds will be tagged with the pipeline start time in yyyyMMddHHmmss 
# and branch name.
#

trigger:
- main

pool: 'CMS Project' 

parameters:
  - name: nodeVersion
    type: string
    default: '22.x'
    values:
      - '18.x'
      - '20.x'
      - '22.x'

variables:
  runDateTag: $[format('{0:yyyyMMddHHmmss}', pipeline.startTime)]
  sonarOrg: "assetworks-fleet"
  sonarProjectKey: "AssetworksLLC_INN-CMS-asw-portal-ui"

stages:
- stage: Analyze
  jobs: 
  - job: AnalyzeSourceCode
    displayName: 'Analyze Source Code'
    steps:

      - task: SonarCloudPrepare@2
        displayName: 'Prepare Analysis'
        inputs:
          SonarCloud: 'Sonarcloud-CMS'
          organization: '$(sonarOrg)'
          scannerMode: 'CLI'
          configMode: 'manual'
          cliProjectKey: '$(sonarProjectKey)'
          cliSources: '.'
          extraProperties: |
            sonar.exclusions=node_modules/**/*
      - task: SonarCloudAnalyze@2
        displayName: 'Run Code Analysis'
        inputs:
          jdkversion: 'JAVA_HOME_17_X64'
      
      - task: SonarCloudPublish@2
        displayName: 'Publish Analysis'
        inputs:
          pollingTimeoutSec: '300'

- stage: Build
  jobs:
  - job: BuildAndPublishArtifacts
    displayName: 'Publish Angular Project Artifacts'
    steps:

      # use node tool to install the specified version of node\
      - task: NodeTool@0
        displayName: 'Use Node.js ${{ parameters.nodeVersion }}'
        inputs:
          versionSpec: '${{ parameters.nodeVersion }}'

      # build the project
      - task: PowerShell@2
        displayName: 'Build Project'
        inputs:
          targetType: 'inline'
          script: |
            npm i
            ng build

      # remove the node modules/dist folders as we'll be rebuilding this project in the release pipeline
      - task: DeleteFiles@1
        displayName: 'Delete Build Files'
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: |
            node_modules
            dist

      # copy the output & source to the output directory  
      - task: CopyFiles@2
        displayName: 'Copy Output'
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: '**'
          TargetFolder: '$(Build.ArtifactStagingDirectory)'

      # add build tags
      - task: PowerShell@2
        displayName: Add Build Tags
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "##vso[build.addbuildtag]$(runDateTag)"
            Write-Host "##vso[build.addbuildtag]$(Build.SourceBranchName)"
      
      # publish the artifacts
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifacts'
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'drop'
          publishLocation: 'Container'
