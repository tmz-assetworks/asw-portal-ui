#
# Pipeline that will build the service project and publish the artifacts so 
# they can be picked up by a release. This pipeline builds/publishes a single 
# project: PortalRestService.Api
#
# This will publish the API project to a folder named /publish and then copy the Dockerfile
# to the root directory. This directory structure will match what the Dockerfile expects
#
# Example directory structure of artifacts:
#
#  /
#    Dockerfile
#    /publish
#      ...
#      ...
#
# Builds will be tagged with the pipeline start time in yyyyMMddHHmmss and branch name.
#

trigger:
- none

pool:
  vmImage: ubuntu-latest # todo change to self-hosted agent

variables:    
  runDateTag: $[format('{0:yyyyMMddHHmmss}', pipeline.startTime)]

jobs: 
- job: BuildAngular
  steps:

  # install angular cli
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          npm install -g @angular/cli
          npm i
          ng build --output-path $(Build.ArtifactStagingDirectory)/dist/asset-works

    # copy the docker file to the artifact directory
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: '**/Dockerfile'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        flattenFolders: true

    # add build tags
    - task: PowerShell@2
      displayName: Add Build Tags
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "##vso[build.addbuildtag]$(runDateTag)"
          Write-Host "##vso[build.addbuildtag]$(Build.SourceBranchName)"
    
    # publish the artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'
